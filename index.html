<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mark Lee — CG Animator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/good-times" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a08;
      --surface: #111110;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #7a7670;
      --accent: #c8b89a;
      --accent-dim: rgba(200,184,154,0.12);
      --glow: rgba(200,184,154,0.04);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 1000;
    }

    /* ── HEADER ── */
    header {
      padding: 64px 60px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      animation: fadeUp 0.9s ease both;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Good Times', sans-serif;
      font-weight: 400;
      font-size: clamp(32px, 5vw, 72px);
      line-height: 1.05;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .discipline {
      margin-top: 20px;
      font-size: 15px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: default;
    }

    .intro {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--accent);
      opacity: 0.75;
      cursor: default;
    }

    /* ── NAV LINKS ── */
    nav {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      padding-bottom: 6px;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    nav a:hover { color: var(--accent); }

    nav a .icon {
      width: 14px;
      height: 14px;
      opacity: 0.5;
      transition: opacity 0.25s;
    }

    nav a:hover .icon { opacity: 1; }

    .nav-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ── MAIN ── */
    main {
      padding: 72px 60px;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    /* ── REEL SECTION ── */

    .section-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 22px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Good Times', sans-serif;
      cursor: default;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .video-wrapper {
      max-width: 1400px;
      margin: 0 auto;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Placeholder shown when no embed is set */
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
    }

    .video-placeholder .play-ring {
      width: 64px;
      height: 64px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-placeholder .play-ring svg {
      width: 22px;
      height: 22px;
      fill: var(--muted);
      transform: translateX(2px);
    }

    .video-placeholder p {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .video-note {
      margin-top: 14px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: right;
    }

    .reel-section {
      scroll-margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .reel-section .section-header {
      width: 100%;
    }

    .video-wrapper {
      width: 100%;
    }

    .video-note code {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 6px;
      font-size: 10px;
    }

    /* ── ABOUT / DETAILS ── */
    .details-grid {
      margin-top: 72px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .detail-cell {
      background: var(--bg);
      padding: 36px 40px;
      transition: background 0.3s ease;
    }

    .detail-cell:hover {
      background: var(--glow);
    }

    .detail-cell .cell-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .detail-cell .cell-value {
      font-family: 'Good Times', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
    }

    .detail-cell .cell-value a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.25s, color 0.25s;
    }

    .detail-cell .cell-value a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── FOOTER ── */
    footer {
      padding: 36px 60px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .footer-name {
      font-family: 'Good Times', sans-serif;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0.5;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; padding: 40px 28px 36px; }
      nav { align-items: flex-start; }
      main { padding: 48px 28px; }
      .details-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; align-items: flex-start; padding: 28px; }
    }
  </style>

</head>
